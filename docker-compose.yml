  redis:
    image: redis/redis-stack:latest
    container_name: legal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI (optional)
    environment:
      - REDIS_ARGS=--save 900 1 --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - legal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP REST Port
      - "6334:6334" # gRPC Port
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - legal-network
    healthcheck:
      # Lệnh này cực kỳ tối giản: chỉ thử mở luồng kết nối tới port 6333, không cần giả lập HTTP GET phức tạp
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10          # Tăng số lần thử lên 10
      start_period: 60s    # Cho Qdrant 1 phút (60s) để thoải mái nạp 3.6GB dữ liệu vào RAM
    deploy:
      resources:
        limits:
          memory: 6G # Giới hạn RAM tối đa để đảm bảo ổn định

networks:
  legal-network:
    name: legal-network
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
