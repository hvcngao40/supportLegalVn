services:
  api:
    build: .
    container_name: legal-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - SQLITE_DB_PATH=/data/legal_poc.db
      - EMBEDDING_DEVICE=auto
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - legal-network
    volumes:
      # Sử dụng Bind Mount để map thư mục cục bộ vào container chứa SQLite
      - ./sqlite_data:/data
    healthcheck:
      # Vì Dockerfile của bạn có cài curl, hãy check thẳng vào port 8000 của FastAPI
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP REST Port
      - "6334:6334" # gRPC Port
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - legal-network
    healthcheck:
      # Lệnh này cực kỳ tối giản: chỉ thử mở luồng kết nối tới port 6333, không cần giả lập HTTP GET phức tạp
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10          # Tăng số lần thử lên 10
      start_period: 60s    # Cho Qdrant 1 phút (60s) để thoải mái nạp 3.6GB dữ liệu vào RAM
    deploy:
      resources:
        limits:
          memory: 4G # Giới hạn RAM tối đa để đảm bảo ổn định

networks:
  legal-network:
    name: legal-network
    driver: bridge

volumes:
  qdrant_data:
  # Đã xóa phần khai báo sqlite_data rỗng ở đây để tránh conflict với Bind Mount phía trên